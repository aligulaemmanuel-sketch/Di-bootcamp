<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Pixel Art Maker</title>
</head>
<body class="bg-zinc-900 min-h-screen flex flex-col items-center justify-center gap-8 p-4">
  <h1 class="text-4xl font-black text-white tracking-tighter uppercase">Pixel Art</h1>
  
  <div id="palette" class="flex gap-3 p-4 bg-zinc-800 rounded-2xl shadow-2xl border-2 border-zinc-700">
    <div class="color w-10 h-10 rounded-full cursor-pointer border-2 border-transparent hover:scale-110 transition-transform active:scale-90" style="background: #ef4444;"></div>
    <div class="color w-10 h-10 rounded-full cursor-pointer border-2 border-transparent hover:scale-110 transition-transform active:scale-90" style="background: #3b82f6;"></div>
    <div class="color w-10 h-10 rounded-full cursor-pointer border-2 border-transparent hover:scale-110 transition-transform active:scale-90" style="background: #22c55e;"></div>
    <div class="color w-10 h-10 rounded-full cursor-pointer border-2 border-transparent hover:scale-110 transition-transform active:scale-90" style="background: #eab308;"></div>
    <div class="color w-10 h-10 rounded-full cursor-pointer border-2 border-transparent hover:scale-110 transition-transform active:scale-90" style="background: #000000;"></div>
    <div class="color w-10 h-10 rounded-full cursor-pointer border-2 border-zinc-600 hover:scale-110 transition-transform active:scale-90" style="background: #ffffff;"></div>
  </div>

  <div id="grid-container" class="grid grid-cols-[repeat(20,1.5rem)] grid-rows-[repeat(20,1.5rem)] gap-px bg-zinc-700 border-2 border-zinc-700 shadow-2xl overflow-hidden rounded-sm"></div>

  <button onclick="location.reload()" class="px-6 py-2 bg-zinc-800 text-zinc-400 rounded-lg hover:text-white transition-colors text-sm font-bold uppercase tracking-widest">Clear Canvas</button>

  <script src="script.js"></script>
</body>
</html>
