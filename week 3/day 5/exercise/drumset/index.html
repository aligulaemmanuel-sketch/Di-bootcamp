<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Pro Drum Kit</title>
  <style>
    .playing { transform: scale(1.1); border-color: #ffc600; box-shadow: 0 0 20px #ffc600; }
  </style>
</head>
<body class="bg-zinc-950 min-h-screen flex items-center justify-center font-mono bg-[linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url('../../mood.png')] bg-cover bg-center">
  <div class="drum-machine p-8 bg-zinc-900/90 backdrop-blur-sm rounded-3xl border-8 border-zinc-800 shadow-2xl">
    <div class="keys flex flex-wrap justify-center gap-4">
      <div data-key="65" class="key flex flex-col items-center justify-center w-24 h-24 border-4 border-zinc-700 rounded-xl bg-black/50 text-white transition-all duration-75 cursor-pointer hover:border-zinc-500"><kbd class="text-3xl font-bold">A</kbd><span class="text-[10px] uppercase tracking-tighter text-yellow-500">Boom</span></div>
      <div data-key="83" class="key flex flex-col items-center justify-center w-24 h-24 border-4 border-zinc-700 rounded-xl bg-black/50 text-white transition-all duration-75 cursor-pointer hover:border-zinc-500"><kbd class="text-3xl font-bold">S</kbd><span class="text-[10px] uppercase tracking-tighter text-yellow-500">Clap</span></div>
      <div data-key="68" class="key flex flex-col items-center justify-center w-24 h-24 border-4 border-zinc-700 rounded-xl bg-black/50 text-white transition-all duration-75 cursor-pointer hover:border-zinc-500"><kbd class="text-3xl font-bold">D</kbd><span class="text-[10px] uppercase tracking-tighter text-yellow-500">Hi-Hat</span></div>
      <div data-key="70" class="key flex flex-col items-center justify-center w-24 h-24 border-4 border-zinc-700 rounded-xl bg-black/50 text-white transition-all duration-75 cursor-pointer hover:border-zinc-500"><kbd class="text-3xl font-bold">F</kbd><span class="text-[10px] uppercase tracking-tighter text-yellow-500">Kick</span></div>
      <div data-key="71" class="key flex flex-col items-center justify-center w-24 h-24 border-4 border-zinc-700 rounded-xl bg-black/50 text-white transition-all duration-75 cursor-pointer hover:border-zinc-500"><kbd class="text-3xl font-bold">G</kbd><span class="text-[10px] uppercase tracking-tighter text-yellow-500">OpenHat</span></div>
      <div data-key="72" class="key flex flex-col items-center justify-center w-24 h-24 border-4 border-zinc-700 rounded-xl bg-black/50 text-white transition-all duration-75 cursor-pointer hover:border-zinc-500"><kbd class="text-3xl font-bold">H</kbd><span class="text-[10px] uppercase tracking-tighter text-yellow-500">Ride</span></div>
      <div data-key="74" class="key flex flex-col items-center justify-center w-24 h-24 border-4 border-zinc-700 rounded-xl bg-black/50 text-white transition-all duration-75 cursor-pointer hover:border-zinc-500"><kbd class="text-3xl font-bold">J</kbd><span class="text-[10px] uppercase tracking-tighter text-yellow-500">Snare</span></div>
      <div data-key="75" class="key flex flex-col items-center justify-center w-24 h-24 border-4 border-zinc-700 rounded-xl bg-black/50 text-white transition-all duration-75 cursor-pointer hover:border-zinc-500"><kbd class="text-3xl font-bold">K</kbd><span class="text-[10px] uppercase tracking-tighter text-yellow-500">Tink</span></div>
      <div data-key="76" class="key flex flex-col items-center justify-center w-24 h-24 border-4 border-zinc-700 rounded-xl bg-black/50 text-white transition-all duration-75 cursor-pointer hover:border-zinc-500"><kbd class="text-3xl font-bold">L</kbd><span class="text-[10px] uppercase tracking-tighter text-yellow-500">Tom</span></div>
    </div>
  </div>

  <audio data-key="65" src="sounds/boom.wav"></audio>
  <audio data-key="83" src="sounds/clap.wav"></audio>
  <audio data-key="68" src="sounds/hihat.wav"></audio>
  <audio data-key="70" src="sounds/kick.wav"></audio>
  <audio data-key="71" src="sounds/openhat.wav"></audio>
  <audio data-key="72" src="sounds/ride.wav"></audio>
  <audio data-key="74" src="sounds/snare.wav"></audio>
  <audio data-key="75" src="sounds/tink.wav"></audio>
  <audio data-key="76" src="sounds/tom.wav"></audio>

  <script src="script.js"></script>
</body>
</html>
